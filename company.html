<!DOCTYPE html>
<html>
<head>
  <title>Join as a Transportation Company | Fall River Safe Rides</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b2c4a;
      color: white;
      padding: 40px 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    p {
      text-align: center;
      margin-bottom: 30px;
    }
    form {
      background: #123a5e;
      padding: 25px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background-color: #ffc107;
      color: black;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #ffc107;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Join as a Transportation Company</h1>
    <p>Sign up to receive ride requests from local families in Fall River.</p>

    <form>
      <label>Company Name</label>
      <input type="text" placeholder="Enter company name">

      <label>Contact Name</label>
      <input type="text" placeholder="Enter contact name">

      <label>Email</label>
      <input type="email" placeholder="Enter email">

      <label>Phone Number</label>
      <input type="text" placeholder="Enter phone number">

      <label>Service Area</label>
      <input type="text" placeholder="Describe your service area">

      <label>About Your Company</label>
      <textarea rows="4" placeholder="Tell families about your company"></textarea>

      <button type="submit">Join the Platform</button>
    </form>

    <a class="back" href="index.html">← Back to Home</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Fall River Safe Rides</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background-color: #0b2c4a;
      color: white;
    }
    .container {
      padding: 50px 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 300px;
      margin: 0 auto;
    }
    a {
      text-decoration: none;
    }
    .btn {
      padding: 15px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
    }
    .parent {
      background-color: #ffc107;
      color: black;
    }
    .provider {
      background-color: white;
      color: #0b2c4a;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Fall River Safe Rides</h1>
    <p>Safe, reliable transportation for Fall River students.</p>

    <div class="buttons">
      <a href="#">
        <button class="btn parent">Find a Ride</button>
      </a>
      <a href="#">
        <button class="btn provider">Join as a Transportation Company</button>
      </a>
    </div>
  </div>
</body>
</html>
